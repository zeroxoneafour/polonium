name: Make polonium.kwinscript

on:
    push:
        branches: ["dev"]
    pull_request:
        branches: ["master"]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Install rust dependencies
              run: sudo apt-get install -y pkg-config libdbus-1-dev

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: latest

            - name: Build kwinscript
              run: make build

            - name: Build dbus-saver
              run: make dbus-build

            - name: Upload kwinscript
              uses: actions/upload-artifact@v7
              with:
                  name: polonium.kwinscript
                  path: ./polonium.kwinscript

            - name: Upload dbus-saver
              uses: actions/upload-artifact@v7
              with:
                  name: polonium-saver
                  path: ./dbus-saver/target/release/polonium-saver
