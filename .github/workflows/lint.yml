name: Lint

on:
    push:
    pull_request:

jobs:
    formatting:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Install dependencies
              run: sudo apt-get install -y npm

            - name: Lint with make
              run: make lint
